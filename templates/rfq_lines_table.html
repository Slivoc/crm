<table class="styled-table">
  <thead>
    <tr>
      <th>Line Number</th>
      <th>Part Number</th>
      <th>Quantity</th>
      <th>Manufacturer</th>
      <th>Suggested Suppliers</th>
      <th>Chosen Supplier</th>
      <th>Cost</th>
      <th>Supplier Lead Time</th>
      <th>Margin</th>
      <th>Price</th>
      <th>Lead Time</th>
      <th>Line Value</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    {% for line in rfq_lines %}
      <tr>
        <form action="{{ url_for('rfqs.update_rfq_line_route', rfq_id=rfq_id, line_id=line.id) }}" method="post" oninput="updatePriceAndValue(this)">
          <td><input type="text" name="line_number" value="{{ line.line_number }}" required></td>
          <td><input type="text" name="part_number" value="{{ line.part_number }}" required></td>
          <td><input type="number" name="quantity" value="{{ line.quantity }}" required></td>
          <td><input type="text" name="manufacturer" value="{{ line.manufacturer }}"></td>
          <td>
            <select name="suggested_suppliers" multiple>
              {% for supplier in suppliers %}
                <option value="{{ supplier.id }}" {% if supplier.id in line.suggested_suppliers.split(',') %}selected{% endif %}>{{ supplier.name }}</option>
              {% endfor %}
            </select>
          </td>
          <td>
            <select name="chosen_supplier">
              {% for supplier in suppliers %}
                <option value="{{ supplier.id }}" {% if supplier.id == line.chosen_supplier %}selected{% endif %}>{{ supplier.name }}</option>
              {% endfor %}
            </select>
          </td>
          <td><input type="number" step="0.01" name="cost" value="{{ line.cost }}" required></td>
          <td><input type="number" name="supplier_lead_time" value="{{ line.supplier_lead_time }}"></td>
          <td><input type="number" step="0.01" name="margin" value="{{ line.margin }}" required></td>
          <td><input type="number" step="0.01" name="price" value="{{ line.price }}" readonly></td>
          <td><input type="number" name="lead_time" value="{{ line.lead_time }}"></td>
          <td><input type="number" step="0.01" name="line_value" value="{{ line.line_value }}" readonly></td>
          <td><button type="submit">Update</button></td>
        </form>
      </tr>
    {% endfor %}
  </tbody>
</table>
