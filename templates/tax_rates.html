{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Tax Rates Management</h2>
        <a href="/" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>

    <!-- Tax Rate Creation Form -->
    <div class="card mb-4">
        <div class="card-header">
            <h4>Add New Tax Rate</h4>
        </div>
        <div class="card-body">
            <form id="createTaxRateForm">
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="tax_name" class="form-label">Tax Name*</label>
                            <input type="text" class="form-control" id="tax_name" name="tax_name" required placeholder="e.g., VAT Standard">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="tax_percentage" class="form-label">Tax Percentage (%)*</label>
                            <input type="number" step="0.01" class="form-control" id="tax_percentage" name="tax_percentage" required placeholder="e.g., 20">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="country" class="form-label">Country*</label>
                            <input type="text" class="form-control" id="country" name="country" required placeholder="e.g., United Kingdom">
                        </div>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-success w-100 mb-3" id="createTaxButton">
                            <i class="fas fa-plus-circle"></i> Add
                        </button>
                    </div>
                </div>
            </form>
            <div id="taxFormFeedback"></div>
        </div>
    </div>

    <!-- Existing Tax Rates Table -->
    <div class="card">
        <div class="card-header">
            <h4>Existing Tax Rates</h4>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped" id="taxRatesTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tax Name</th>
                            <th>Percentage</th>
                            <th>Country</th>
                            <th>Created Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="taxRatesTableBody">
                        <!-- Tax rates will be loaded here -->
                        <tr>
                            <td colspan="6" class="text-center">Loading tax rates...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Tax Rate Modal -->
    <div class="modal fade" id="editTaxRateModal" tabindex="-1" aria-labelledby="editTaxRateModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editTaxRateModalLabel">Edit Tax Rate</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editTaxRateForm">
                        <input type="hidden" id="edit_tax_id" name="tax_id">
                        <div class="mb-3">
                            <label for="edit_tax_name" class="form-label">Tax Name</label>
                            <input type="text" class="form-control" id="edit_tax_name" name="tax_name" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit_tax_percentage" class="form-label">Tax Percentage (%)</label>
                            <input type="number" step="0.01" class="form-control" id="edit_tax_percentage" name="tax_percentage" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit_country" class="form-label">Country</label>
                            <input type="text" class="form-control" id="edit_country" name="country" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="updateTaxButton">Update Tax Rate</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const createTaxRateForm = document.getElementById('createTaxRateForm');
    const taxRatesTableBody = document.getElementById('taxRatesTableBody');
    const editTaxRateForm = document.getElementById('editTaxRateForm');
    const taxFormFeedback = document.getElementById('taxFormFeedback');
    const editTaxRateModal = new bootstrap.Modal(document.getElementById('editTaxRateModal'));

    // Function to show feedback message
    function showFeedback(message, type) {
        taxFormFeedback.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show mt-3">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>`;
    }

    // Function to load tax rates
    function loadTaxRates() {
        taxRatesTableBody.innerHTML = '<tr><td colspan="6" class="text-center">Loading tax rates...</td></tr>';

        fetch('/tax_rates/api')
        .then(response => response.json())
        .then(data => {
            if (data.success && data.tax_rates.length > 0) {
                taxRatesTableBody.innerHTML = '';

                data.tax_rates.forEach(tax => {
                    const createdDate = new Date(tax.created_at).toLocaleDateString();

                    taxRatesTableBody.innerHTML += `
                        <tr>
                            <td>${tax.id}</td>
                            <td>${tax.tax_name}</td>
                            <td>${tax.tax_percentage}%</td>
                            <td>${tax.country}</td>
                            <td>${createdDate}</td>
                            <td>
                                <button class="btn btn-sm btn-primary edit-tax" data-id="${tax.id}"
                                    data-name="${tax.tax_name}" data-percentage="${tax.tax_percentage}"
                                    data-country="${tax.country}">
                                    <i class="fas fa-edit"></i> Edit
                                </button>
                                <button class="btn btn-sm btn-danger delete-tax" data-id="${tax.id}">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </td>
                        </tr>
                    `;
                });

                // Add event listeners to edit and delete buttons
                addActionButtonListeners();
            } else {
                taxRatesTableBody.innerHTML = '<tr><td colspan="6" class="text-center">No tax rates found</td></tr>';
            }
        })
        .catch(error => {
            console.error('Error loading tax rates:', error);
            taxRatesTableBody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error loading tax rates</td></tr>';
        });
    }

    // Function to add event listeners to action buttons
    function addActionButtonListeners() {
        // Edit button listeners
        document.querySelectorAll('.edit-tax').forEach(button => {
            button.addEventListener('click', function() {
                const id = this.getAttribute('data-id');
                const name = this.getAttribute('data-name');
                const percentage = this.getAttribute('data-percentage');
                const country = this.getAttribute('data-country');

                // Fill the edit form
                document.getElementById('edit_tax_id').value = id;
                document.getElementById('edit_tax_name').value = name;
                document.getElementById('edit_tax_percentage').value = percentage;
                document.getElementById('edit_country').value = country;

                // Show the modal
                editTaxRateModal.show();
            });
        });

        // Delete button listeners
        document.querySelectorAll('.delete-tax').forEach(button => {
            button.addEventListener('click', function() {
                if (confirm('Are you sure you want to delete this tax rate?')) {
                    const id = this.getAttribute('data-id');

                    fetch(`/tax_rates/api/${id}`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            showFeedback('Tax rate deleted successfully!', 'success');
                            loadTaxRates();
                        } else {
                            showFeedback(`Error: ${data.error || 'Could not delete tax rate'}`, 'danger');
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        showFeedback('An error occurred while deleting the tax rate', 'danger');
                    });
                }
            });
        });
    }

    // Load tax rates on page load
    loadTaxRates();

    // Handle tax rate creation
    if (createTaxRateForm) {
        createTaxRateForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const taxData = {
                tax_name: document.getElementById('tax_name').value,
                tax_percentage: parseFloat(document.getElementById('tax_percentage').value),
                country: document.getElementById('country').value
            };

            // Show loading state
            const button = document.getElementById('createTaxButton');
            const originalText = button.innerHTML;
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Adding...';

            // Send request to create tax rate
            fetch('/tax_rates/api', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(taxData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Reset form
                    createTaxRateForm.reset();

                    // Show success message
                    showFeedback('Tax rate created successfully!', 'success');

                    // Reload tax rates
                    loadTaxRates();
                } else {
                    showFeedback(`Error: ${data.error || 'Could not create tax rate'}`, 'danger');
                }

                // Restore button
                button.disabled = false;
                button.innerHTML = originalText;
            })
            .catch(error => {
                console.error('Error:', error);
                showFeedback('An error occurred while creating the tax rate', 'danger');
                button.disabled = false;
                button.innerHTML = originalText;
            });
        });
    }

    // Handle tax rate update
    const updateTaxButton = document.getElementById('updateTaxButton');
    if (updateTaxButton) {
        updateTaxButton.addEventListener('click', function() {
            const taxId = document.getElementById('edit_tax_id').value;

            const taxData = {
                tax_name: document.getElementById('edit_tax_name').value,
                tax_percentage: parseFloat(document.getElementById('edit_tax_percentage').value),
                country: document.getElementById('edit_country').value
            };

            // Show loading state
            const originalText = updateTaxButton.textContent;
            updateTaxButton.disabled = true;
            updateTaxButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

            // Send request to update tax rate
            fetch(`/tax_rates/api/${taxId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(taxData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Hide modal
                    editTaxRateModal.hide();
                    
                    // Show success message
                    showFeedback('Tax rate updated successfully!', 'success');
                    
                    // Reload tax rates
                    loadTaxRates();
                } else {
                    showFeedback(`Error: ${data.error || 'Could not update tax rate'}`, 'danger');
                }
                
                // Restore button
                updateTaxButton.disabled = false;
                updateTaxButton.innerHTML = originalText;
            })
            .catch(error => {
                console.error('Error:', error);
                showFeedback('An error occurred while updating the tax rate', 'danger');
                updateTaxButton.disabled = false;
                updateTaxButton.innerHTML = originalText;
            });
        });
    }
});
</script>
{% endblock %}
