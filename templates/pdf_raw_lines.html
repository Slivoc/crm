{% extends "base.html" %}
{% block content %}
<div class="section">
    <h1>Map PDF Data to Offer Fields</h1>

    <h2>Extracted Raw PDF Content</h2>
    <form action="{{ url_for('offers.map_columns', offer_id=offer_id) }}" method="POST">
        <table class="table">
            <thead>
                <tr>
                    <th>Raw Line</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for line in extracted_lines %}
                    <tr>
                        <td>{{ line }}</td>
                        <td>
                            <select name="mapping_{{ loop.index }}">
                                <option value="ignore">Ignore</option>
                                <option value="part_number">Part Number</option>
                                <option value="quantity">Quantity</option>
                                <option value="lead_time">Lead Time</option>
                                <option value="price">Price</option>
                            </select>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
        <button type="submit" class="button is-primary">Map Lines</button>
    </form>
</div>
{% endblock %}
