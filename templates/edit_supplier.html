{% extends "base.html" %}

{% block breadcrumbs %}{{ super() }}{% endblock %}

{% block content %}
<div>
    <h1 class="section-header">Edit Supplier #{{ supplier.id }}</h1>
 </div>
  <div class="section">
    <h2>Supplier Details</h2>
    <form action="{{ url_for('suppliers.update_supplier_route', supplier_id=supplier.id) }}" method="post" class="horizontal-form">
      <div class="form-row">
        <div class="form-group">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" value="{{ supplier.name }}" required>
        </div>
        <div class="form-group">
          <label for="contact_name">Contact Name:</label>
          <input type="text" id="contact_name" name="contact_name" value="{{ supplier.contact_name }}" required>
        </div>
        <div class="form-group">
          <label for="contact_email">Contact Email:</label>
          <input type="email" id="contact_email" name="contact_email" value="{{ supplier.contact_email }}" required>
        </div>
        <div class="form-group">
          <label for="contact_phone">Contact Phone:</label>
          <input type="text" id="contact_phone" name="contact_phone" value="{{ supplier.contact_phone }}">
        </div>
        <div class="form-group">
          <label for="buffer">Buffer (weeks):</label>
          <input type="number" id="buffer" name="buffer" value="{{ supplier.buffer }}">
        </div>
            <div class="form-group">
                <label for="currency">Currency:</label>
                <select id="currency" name="currency" required>
                    {% for currency in currencies %}
                        <option value="{{ currency.id }}" {% if currency.id == supplier.currency %}selected{% endif %}>
                            {{ currency.currency_code }}
                        </option>
                    {% endfor %}
                </select>
            </div>

        <div class="form-group">
          <label for="fornitore">Fornitore:</label>
          <input type="text" id="fornitore" name="fornitore" value="{{ supplier.fornitore }}">
        </div>
        <div class="form-group">
          <label for="standard_condition">Standard Condition:</label>
          <input type="text" id="standard_condition" name="standard_condition" value="{{ supplier.standard_condition or '' }}">
        </div>
        <div class="form-group">
          <label for="standard_certs">Standard Certs:</label>
          <input type="text" id="standard_certs" name="standard_certs" value="{{ supplier.standard_certs or '' }}">
        </div>
      </div>
      <div class="button-container">
        <button type="submit" class="button">Update Supplier</button>
      </div>
    </form>
  </div>

<script>
document.querySelector('form').addEventListener('submit', function(event) {
    alert('Form is being submitted!');
});
</script>
{% endblock %}
