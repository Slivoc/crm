{% extends "base.html" %}

{% block content %}
<div class="container-fluid">

    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-1">Customers</h2>
                <p class="text-muted">Manage and track your customer accounts</p>
            </div>
            <button class="btn btn-primary" onclick="showAddCustomerModal()">
                <i class="bi bi-plus-lg me-1"></i> Add Customer
            </button>
        </div>
    </div>

    <div class="card">
        <div class="card-body table-container">
            <div class="d-flex flex-wrap gap-2 mb-3">
                <input type="text" class="form-control form-control-sm w-auto"
                       placeholder="Search name..." id="filterName" onkeyup="applyFilters()">
                <input type="text" class="form-control form-control-sm w-auto"
                       placeholder="Filter status..." id="filterStatus" onkeyup="applyFilters()">
                <select class="form-select form-select-sm w-auto"
                        id="filterSalesperson"
                        onchange="applyFilters()">
                    <option value="">All salespeople</option>
                    <!-- Options will be populated dynamically -->
                </select>
                <select class="form-select form-select-sm w-auto"
                        id="filterWatch"
                        onchange="applyFilters()">
                    <option value="">All</option>
                    <option value="true">Watched</option>
                    <option value="false">Not Watched</option>
                </select>
            </div>
            <div class="table-responsive">
                <table class="table table-hover" id="customersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Salesperson</th>
                            <th>Status</th>
                            <th>Watch</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customersList">
                        <!-- Rows will be loaded here -->
                    </tbody>
                </table>
            </div>

            <!-- Loading spinner -->
            <div id="loadingSpinner" class="text-center p-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>

            <!-- No results message -->
            <div id="noResultsMessage" class="text-center p-4 my-4" style="display: none;">
                <div class="text-muted">
                    <i class="bi bi-search fs-2 d-block mb-3"></i>
                    No customers found
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="d-flex justify-content-between align-items-center p-3 border-top">
                <!-- Pagination will be rendered here -->
            </div>
        </div>
    </div>
<script>
    let currentPage = 1;
    let currentFilters = {
        name: '',
        salesperson: '',
        status: '',
        watch: ''
    };


    /**
     * Load customers from the server with current filters and pagination.
     * @param {number} page - The page number to load.
     */
function loadCustomers(page = 1) {
    currentPage = page;

    const spinner = document.getElementById('loadingSpinner');
    const tableBody = document.getElementById('customersList');
    const noResults = document.getElementById('noResultsMessage');
    const paginationDiv = document.getElementById('pagination');

    // Clear existing content
    while (tableBody.firstChild) {
        tableBody.removeChild(tableBody.firstChild);
    }

    spinner.style.display = 'block';
    noResults.style.display = 'none';
    paginationDiv.innerHTML = '';

    const params = new URLSearchParams({
        page: page,
        search: '',
        sort_by: 'name',
        order: 'asc'
    });

    // Add per-column filters
    for (const [key, value] of Object.entries(currentFilters)) {
        if (value && value.trim() !== '') {
            params.append(`filter_${key}`, value.trim());
        }
    }

    fetch(`/customers/api/customers/filter?${params.toString()}`)
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => {
                    throw new Error(err.error || 'Server error');
                });
            }
            return response.json();
        })
        .then(data => {
            spinner.style.display = 'none';

            if (!data || !data.customers) {
                throw new Error('Invalid response format');
            }

            if (data.customers.length === 0) {
                noResults.style.display = 'block';
                return;
            }

            // Create a document fragment for better performance
            const fragment = document.createDocumentFragment();

            data.customers.forEach(customer => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${customer.id}</td>
                    <td>
                        <a href="/customers/${customer.id}/edit"
                           class="fw-bold text-dark text-decoration-none">
                            ${sanitizeHTML(customer.name || '')}
                        </a>
                    </td>
                    <td>${sanitizeHTML(customer.salesperson_name || 'No salesperson')}</td>
                    <td>${sanitizeHTML(customer.status || '')}</td>
                    <td>
                        <button class="btn btn-link p-0 watch-toggle"
                                data-customer-id="${customer.id}"
                                data-watch="${customer.watch}"
                                onclick="toggleWatch(this)"
                                title="${customer.watch ? 'Remove from watch' : 'Add to watch'}">
                            <i class="bi ${customer.watch ? 'bi-eye-fill text-primary' : 'bi-eye text-muted'}"></i>
                        </button>
                    </td>
                    <td>
                        <div class="btn-group" role="group">
                            <form action="/customers/${customer.id}/edit" method="get" class="me-2">
                                <button type="submit" class="btn btn-primary btn-sm">Edit</button>
                            </form>
                        </div>
                    </td>
                `;
                fragment.appendChild(row);
            });

            // Clear the table again (just to be safe) and append all rows at once
            while (tableBody.firstChild) {
                tableBody.removeChild(tableBody.firstChild);
            }
            tableBody.appendChild(fragment);

            renderPagination(data);
        })
        .catch(error => {
            console.error('Error details:', error);
            spinner.style.display = 'none';
            noResults.textContent = 'Error loading customers: ' + error.message;
            noResults.style.display = 'block';
        });
}

    /**
     * Render pagination controls based on the data.
     * @param {object} data - The response data from the server.
     */
    function renderPagination(data) {
        const paginationDiv = document.getElementById('pagination');

        // Show pagination only if there's more than one page
        if (data.pages <= 1) {
            paginationDiv.innerHTML = '';
            return;
        }

        let html = '<div class="btn-group">';

        // Previous Button
        if (currentPage > 1) {
            html += `<button class="btn btn-outline-primary" onclick="loadCustomers(${currentPage - 1})">Previous</button>`;
        }

        // Next Button
        if (currentPage < data.pages) {
            html += `<button class="btn btn-outline-primary" onclick="loadCustomers(${currentPage + 1})">Next</button>`;
        }

        html += '</div>';
        html += `<span class="text-muted ms-3">Page ${currentPage} of ${data.pages}</span>`;

        paginationDiv.innerHTML = html;
    }

    /**
     * Sanitize HTML to prevent XSS attacks.
     * @param {string} str - The string to sanitize.
     * @returns {string} - Sanitized string.
     */
    function sanitizeHTML(str) {
        const temp = document.createElement('div');
        temp.textContent = str;
        return temp.innerHTML;
    }

    /**
     * Apply all active filters by collecting their values.
     */
    function applyFilters() {
        currentFilters.name = document.getElementById('filterName').value;
        currentFilters.salesperson = document.getElementById('filterSalesperson').value;
        currentFilters.status = document.getElementById('filterStatus').value;
        currentFilters.watch = document.getElementById('filterWatch').value;
        loadCustomers(1);
    }


    document.addEventListener('DOMContentLoaded', () => {
        loadCustomers();
        loadSalespeople();
    });

// Function to load salespeople
function loadSalespeople() {
    fetch('/customers/api/salespeople')
        .then(response => response.json())
        .then(salespeople => {
            const select = document.getElementById('filterSalesperson');
            salespeople.forEach(sp => {
                const option = document.createElement('option');
                option.value = sp.id;
                option.textContent = sp.name;
                select.appendChild(option);
            });
        })
        .catch(error => console.error('Error loading salespeople:', error));
}

async function toggleWatch(button) {
    const customerId = button.getAttribute('data-customer-id');
    const currentWatch = button.getAttribute('data-watch') === 'true';

    try {
        const response = await fetch(`/customers/${customerId}/toggle_watch`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ watch: !currentWatch })
        });

        const data = await response.json();
        if (!response.ok || !data.success) {
            throw new Error(data.error || 'Failed to update watch');
        }

        button.setAttribute('data-watch', data.watch ? 'true' : 'false');
        button.setAttribute(
            'title',
            data.watch ? 'Remove from watch' : 'Add to watch'
        );
        button.innerHTML = `<i class="bi ${data.watch ? 'bi-eye-fill text-primary' : 'bi-eye text-muted'}"></i>`;
    } catch (error) {
        console.error('Error updating watch:', error);
        alert('Failed to update watch: ' + error.message);
    }
}
</script>
