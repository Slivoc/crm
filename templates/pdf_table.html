{% extends "base.html" %}
{% block content %}
<div class="section">
    <h1>Extracted Offer from PDF</h1>
    <form action="{{ url_for('offers.upload_pdf_test', offer_id=offer_id) }}" method="POST" enctype="multipart/form-data">
        <label for="pdf_file">Upload Offer PDF:</label>
        <input type="file" id="pdf_file" name="pdf_file" accept="application/pdf" required>
        <button type="submit" class="button is-primary">Upload and Extract</button>
    </form>

    {% if extracted_table %}
        <h2>Extracted Table</h2>
        <table class="table">
            <thead>
                <tr>
                    <th>Part Number</th>
                    <th>Quantity</th>
                    <th>Lead Time</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                {% for row in extracted_table %}
                    <tr>
                        {% for cell in row %}
                            <td>{{ cell }}</td>
                        {% endfor %}
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% endif %}
</div>
{% endblock %}
