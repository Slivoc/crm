<script>
// Customer Risk Analysis JavaScript Functions
function initializeCustomerRiskAnalysis() {
    console.log('Initializing customer risk analysis...');
    fetchCustomerRiskData();
}

function fetchCustomerRiskData() {
    // Get the salesperson ID from the URL
    const urlParts = window.location.pathname.split('/');
    const salespersonId = urlParts[urlParts.indexOf('salespeople') + 1];

    console.log(`Fetching risk data for salesperson ${salespersonId}`);

    fetch(`/salespeople/${salespersonId}/customer_risk_analysis`)
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            console.log('Received risk analysis data:', data);
            displayRiskAnalysis(data);
        })
        .catch(error => {
            console.error('Error fetching risk analysis:', error);
            showRiskAnalysisError();
        });
}

function displayRiskAnalysis(data) {
    // Update counts in badges
    document.getElementById('immediateRiskCount').textContent = data.immediate_risk.length;
    document.getElementById('mediumRiskCount').textContent = data.medium_risk.length;
    document.getElementById('highRiskCount').textContent = data.high_risk.length;
    document.getElementById('recoveringCount').textContent = data.recovering.length;

    // Display each risk category
    displayRiskCategory('riskAnalysisImmediate', data.immediate_risk, 'immediate', 'No customers need immediate attention');
    displayRiskCategory('riskAnalysisMedium', data.medium_risk, 'medium', 'No customers at medium risk');
    displayRiskCategory('riskAnalysisHigh', data.high_risk, 'high', 'No high-risk customers');
    displayRiskCategory('riskAnalysisRecovering', data.recovering, 'recovering', 'No recovering customers');
}

function displayRiskCategory(containerId, customers, riskLevel, emptyMessage) {
    const container = document.getElementById(containerId);

    if (!customers || customers.length === 0) {
        container.innerHTML = `
            <div class="risk-empty-state">
                <i class="bi bi-check-circle"></i>
                <p class="mb-0">${emptyMessage}</p>
            </div>
        `;
        return;
    }

    // Show top 4 customers for each category
    const displayCustomers = customers.slice(0, 4);
    let html = '';

    displayCustomers.forEach(customer => {
        const formattedValue = `£${customer.total_lifetime_value.toLocaleString('en-US', {
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
        })}`;

        // Format last order date
        const lastOrderDate = customer.last_order_date ?
            new Date(customer.last_order_date).toLocaleDateString('en-GB', {
                day: 'numeric',
                month: 'short'
            }) : 'Unknown';

        // Create risk factors display (show first 2 factors)
        const riskFactorsHtml = customer.risk_factors.slice(0, 2).map(factor =>
            `<span class="risk-factor-tag">${factor}</span>`
        ).join('');

        // Days overdue indicator
        const daysOverdueHtml = customer.days_since_last_order > 0 ?
            `<div class="risk-days-overdue">${customer.days_since_last_order} days since last order</div>` : '';

        html += `
            <div class="risk-customer-item risk-${riskLevel}" onclick="showRiskCustomerDetails('${customer.customer_id}', '${riskLevel}')">
                <div class="d-flex justify-content-between align-items-start mb-1">
                    <span class="risk-customer-name">${customer.customer_name}</span>
                    <span class="risk-score-badge">${Math.round(customer.risk_score)}</span>
                </div>
                <div class="risk-customer-value mb-1">${formattedValue}</div>
                ${daysOverdueHtml}
                <div class="risk-last-order mb-2">Last order: ${lastOrderDate}</div>
                <div class="risk-factors">
                    ${riskFactorsHtml}
                </div>
            </div>
        `;
    });

    // Add "View All" button if there are more customers
    if (customers.length > 4) {
        html += `
            <div class="text-center p-2 border-top">
                <button class="btn btn-sm btn-outline-primary view-all-risk-btn" onclick="showAllRiskCustomers('${riskLevel}')">
                    View All ${customers.length} Customers
                </button>
            </div>
        `;
    }

    container.innerHTML = html;
}

function showRiskAnalysisError() {
    const containers = ['riskAnalysisImmediate', 'riskAnalysisMedium', 'riskAnalysisHigh', 'riskAnalysisRecovering'];

    containers.forEach(containerId => {
        document.getElementById(containerId).innerHTML = `
            <div class="risk-empty-state text-danger">
                <i class="bi bi-exclamation-triangle"></i>
                <p class="mb-0">Error loading risk data</p>
            </div>
        `;
    });
}

function showRiskCustomerDetails(customerId, riskLevel) {
    // This will reuse your existing customer details modal functionality
    // but could be enhanced to show risk-specific information
    if (typeof showCustomerDetails === 'function') {
        showCustomerDetails(customerId);
    } else {
        console.log(`Show details for customer ${customerId} (${riskLevel} risk)`);
    }
}

function showAllRiskCustomers(riskLevel) {
    // Future enhancement: could open a dedicated modal showing all customers in this risk category
    console.log(`Show all customers in ${riskLevel} risk category`);
    // For now, could just alert or scroll to a detailed section
    alert(`Feature coming soon: View all ${riskLevel} risk customers`);
}

// Auto-initialize when this script loads
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initializeCustomerRiskAnalysis);
} else {
    initializeCustomerRiskAnalysis();
}
