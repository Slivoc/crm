    <style>
/* Existing styles remain... */

/* Citation styling */
.ai-citation {
    font-size: 0.8em;
    vertical-align: super;
    color: #2563eb;
    text-decoration: none;
    margin: 0 2px;
}

/* References section styling */
.references-section {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid #e5e7eb;
}

.references-section h2 {
    font-size: 1.25rem;
    color: #374151;
    margin-bottom: 1rem;
}

.references-list {
    font-size: 0.9rem;
    color: #4b5563;
    padding-left: 2rem;
}

.reference-item {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    line-height: 1.5;
}

.reference-number {
    color: #2563eb;
    font-weight: 600;
    min-width: 2rem;
}

/* Make citations clickable and add hover effect */
.ai-citation:hover {
    color: #1e40af;
    text-decoration: underline;
