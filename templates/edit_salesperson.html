{% extends "base.html" %}

{% block content %}
<h1>Edit Salesperson</h1>
<form action="{{ url_for('salespeople.edit_salesperson', salesperson_id=salesperson.id) }}" method="post">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" value="{{ salesperson.name }}" required>
    <button type="submit">Update</button>
</form>
{% endblock %}
