<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Requisitions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <style>
        .quote-container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .quote-container h1, .quote-container p, .quote-container table {
            margin-bottom: 20px;
        }
        .quote-container table {
            width: 100%;
            border-collapse: collapse;
        }
        .quote-container th, .quote-container td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .quote-container th {
            background-color: #f2f2f2;
        }
        .copy-button-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .button {
            padding: 10px 15px;
            background-color: #FF4742;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #FFA07A;
        }
    </style>
</head>
<body>
    <div class="copy-button-container">
        <button id="copyButton" class="button" onclick="copyAllQuotes()">Copy All</button>
    </div>
    {% for supplier_name, details in supplier_emails.items() %}
        <div id="quoteContent_{{ loop.index }}" class="quote-container">
            <h2>Supplier: {{ supplier_name }}</h2>
            <p>Contact Name: {{ details.contact_name }}</p>
            <table>
                <thead>
                    <tr>
                        <th>Part Number</th>
                        <th>Quantity</th>
                    </tr>
                </thead>
                <tbody>
                    {% for line in details.lines %}
                        <tr>
                            <td>{{ line.part_number }}</td>
                            <td>{{ line.quantity }}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
            <button class="button" onclick="copyToClipboard('{% for line in details.lines %}Part Number: {{ line.part_number }}, Quantity: {{ line.quantity }}{% if line.note %}, Note: {{ line.note }}{% endif %}\n{% endfor %}')">Copy</button>
            <a href="#" class="button" onclick="this.href=generateMailtoLink('{{ details.contact_name }}', '{{ details.contact_email }}', 'Requisition for RFQ #{{ rfq_id }} for {{ supplier_name }}', `{% for line in details.lines %}Part Number: {{ line.part_number }}, Quantity: {{ line.quantity }}{% if line.note %}, Note: {{ line.note }}{% endif %}\n{% endfor %}`)">Email</a>
        </div>
    {% endfor %}
    <script>

    </script>
</body>
</html>
