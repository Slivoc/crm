{% extends "base.html" %}
{% block content %}
<div class="section">
    <h1 class="section-header">Acknowledgments for Sales Order #{{ sales_order_id }}</h1>
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>PDF</th>
                <th>Date Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for acknowledgment in acknowledgments %}
            <tr>
                <td>{{ acknowledgment.id }}</td>
                <td>
                    <!-- Link to view/download the PDF -->
                    <a href="{{ url_for('static', filename='pdfs/' + acknowledgment.acknowledgment_pdf.split('/')[-1]) }}" target="_blank">View PDF</a>
                </td>
                <td>{{ acknowledgment.created_at }}</td>
                <td>
                    <!-- Button to trigger email with Outlook -->
                    <a href="{{ url_for('sales_orders.generate_acknowledgment_outlook', sales_order_id=sales_order_id) }}" class="button is-small is-primary">
                        Email via Outlook
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
