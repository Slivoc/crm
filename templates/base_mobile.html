<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sproutt Mobile{% endblock %}</title>
     <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS files first -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />

    <!-- JavaScript files in correct order -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='lumen.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='solid-colors.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/contacts.css') }}">
    <!-- In head after Bootstrap -->
    <script src="{{ url_for('static', filename='js/bootstrap-modal-fix.js') }}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.5/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@6.6.6/css/flag-icons.min.css">
</head>
<body class="bg-light">
    <!-- Simple mobile header -->
    <nav class="navbar navbar-light bg-white border-bottom sticky-top">
        <div class="container-fluid">
            <a href="/" class="navbar-brand d-flex align-items-center">
  <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" width="30" height="24" class="me-2">
  <span class="fs-5 fw-semibold">Sproutt</span>
</a>

            {% if current_user.is_authenticated %}
            <span class="text-muted">{{ current_user.username }}</span>
            {% endif %}
        </div>
    </nav>

    <!-- Main mobile content -->
    <div class="container-fluid p-3">


        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='js/contacts.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
