{% extends "base.html" %}
{% block content %}
<h1>Extracted Table from PDF</h1>

<table border="1">
    <thead>
        <tr>
            {% for header in headers %}
            <th>{{ header }}</th>
            {% endfor %}
        </tr>
    </thead>
    <tbody>
        {% for row in data %}
        <tr>
            {% for cell in row %}
            <td>{{ cell }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="{{ url_for('offers_bp.map_pdf_columns', offer_id=offer_id) }}">Proceed to Column Mapping</a>
{% endblock %}
