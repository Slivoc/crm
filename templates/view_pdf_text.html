<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View PDF Text</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>PDF Text for {{ pdf_filename }}</h1>
        <pre>{{ pdf_text }}</pre>

        <div class="section">
            <h2>AI Extraction</h2>
            <form action="{{ url_for('offers.view_pdf_text', offer_id=offer.id, file_id=file_id) }}" method="post" class="horizontal-form">
                <div class="form-group">
                    <label for="offer_info">Paste Offer Info:</label>
                    <textarea id="offer_info" name="offer_info" rows="10" cols="50"></textarea>
                </div>
                <div class="button-container">
                    <button type="submit" class="button">Extract Offer Lines</button>
                </div>
            </form>
        </div>

        <div class="section">
            <h2>Update Offer Details</h2>
            <form action="{{ url_for('offers.view_pdf_text', offer_id=offer.id, file_id=file_id) }}" method="post" class="horizontal-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="supplier_reference">Supplier Reference:</label>
                        <input type="text" id="supplier_reference" name="supplier_reference" value="{{ offer.supplier_reference }}" required>
                    </div>
                    <div class="form-group">
                        <label for="valid_to">Valid To:</label>
                        <input type="date" id="valid_to" name="valid_to" value="{{ offer.valid_to }}" required>
                    </div>
                </div>
                <div class="button-container">
                    <button type="submit" class="button">Update Offer</button>
                </div>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
</body>
</html>
