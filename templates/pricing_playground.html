{% extends "base.html" %}

{% block content %}

<div class="container-fluid mt-4" x-data="rfqPricingApp()">
    <!-- RFQ Pricing Playground Header -->
    <div class="card mb-4 shadow p-0 border-0">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong>RFQ Pricing Playground #{{ rfq_id }}</strong>
            <button type="button" class="btn btn-primary"
                    hx-post="/api/rfqs/save_pricing"
                    hx-trigger="click"
                    hx-vars="js:JSON.stringify($data.getPricingData())"
                    hx-indicator="#save-indicator">
                Save Pricing <span id="save-indicator" class="htmx-indicator spinner-border spinner-border-sm" role="status"></span>
            </button>
        </div>

        <!-- Summary Panel -->
        <div class="card-body border-bottom">
            <div class="row">
                <div class="col-md-12">
                    <h5>Summary by Supplier</h5>
                    <div class="table-responsive">
                        <div id="supplier-summary-table"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Supplier Settings Panel -->
        <div class="card-body border-bottom">
            <h5>Supplier Settings</h5>
            <div class="row g-3">
                <template x-for="(supplier, supplierId) in supplierSettings" :key="supplierId">
                    <div class="col-md-4 mb-3">
                        <div class="card h-100">
                            <div class="card-header">
                                <strong x-text="supplier.name"></strong>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label :for="'delivery-cost-' + supplierId" class="form-label">Total Delivery Cost</label>
                                    <input type="number" class="form-control" :id="'delivery-cost-' + supplierId"
                                           x-model.number="supplier.deliveryCost" step="0.01" min="0"
                                           @change="updateDeliveryCostAllocations(); updateAllCalculations()">
                                    <small class="text-muted">This cost will be divided equally among all lines.</small>
                                </div>
                                <div class="mb-3">
                                    <label :for="'mov-' + supplierId" class="form-label">Supplier Minimum Order Value (MOV)</label>
                                    <input type="number" class="form-control" :id="'mov-' + supplierId"
                                           x-model.number="supplier.mov" step="1" min="0"
                                           @change="checkAndAdjustForMOV(supplierId); updateAllCalculations()">
                                </div>
                                <div class="mb-3">
                                    <label :for="'line-mov-' + supplierId" class="form-label">Line Minimum Value</label>
                                    <input type="number" class="form-control" :id="'line-mov-' + supplierId"
                                           x-model.number="supplier.lineMinValue" step="0.01" min="0"
                                           @change="checkAndAdjustForLineMOV(supplierId); updateAllCalculations()">
                                    <small class="text-muted">Minimum value for each individual line item (e.g., $15 for Boeing)</small>
                                </div>
                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="checkbox" :id="'auto-adjust-' + supplierId"
                                           x-model="supplier.autoAdjust">
                                    <label class="form-check-label" :for="'auto-adjust-' + supplierId">
                                        Auto-adjust quantities to meet minimum values
                                    </label>
                                </div>
                                <div class="supplier-stats mt-3 pt-3 border-top">
                                    <p class="mb-2">Total Items: <strong x-text="supplier.lines.length"></strong></p>
                                    <p class="mb-2">Total Value: <strong x-text="formatCurrency(calculateSupplierTotalValue(supplierId))"></strong></p>
                                    <p class="mb-2">MOV Status:
                                        <span class="badge"
                                              :class="getMovStatusClass(supplierId)"
                                              x-text="getMovStatusText(supplierId)">N/A</span>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
                <div class="col-md-12" x-show="Object.keys(supplierSettings).length === 0">
                    <div class="alert alert-info">No suppliers chosen yet.</div>
                </div>
            </div>
        </div>

        <!-- Main RFQ Lines Table - Simplified to remove inline editing -->
        <div class="card-body table-container p-0">
            <div id="rfq-lines-table"></div>
        </div>
    </div>
</div>

<!-- Offers Dialog -->
<div class="modal fade" id="offersModal" tabindex="-1" aria-labelledby="offersModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="offersModalLabel">Line Offers</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="offers-table-container"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Include required libraries -->
<link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js" defer></script>
<script src="https://unpkg.com/htmx.org@1.9.4" defer></script>
<script src="https://unpkg.com/alpinejs@3.13.0/dist/cdn.min.js" defer></script>

<script>
// Define Alpine component for rfqPricingApp
document.addEventListener('alpine:init', () => {
    Alpine.data('rfqPricingApp', function() {
        return {
            rfqLines: JSON.parse('{{ rfq_lines|safe }}'),
            allSuppliers: JSON.parse('{{ suppliers|safe }}'),
            statuses: JSON.parse('{{ statuses|safe }}'),
            currencies: JSON.parse('{{ currencies|safe }}'),
            supplierSettings: {},
            lineDeliveryCosts: {},
            rfqLinesTable: null,
            supplierSummaryTable: null,
            offersTable: null,
            summaryTableInitialized: false,
            $store: {
                currentLineId: null
            },

            // Initialize the app
            init() {
                this.initializeSupplierSettings();

                // Delay table initialization to ensure DOM is ready
                setTimeout(() => {
                    this.initializeTables();
                }, 50);

                // Setup HTMX handlers
                htmx.on('htmx:afterSwap', (event) => {
                    if (event.detail.target.id === 'offers-table-container') {
                        this.initializeOffersTable();
                    }
                });

                htmx.on('htmx:afterRequest', (event) => {
                    if (event.detail.requestConfig.path === '/api/rfqs/save_pricing') {
                        if (event.detail.successful) {
                            alert('Pricing saved successfully!');
                        } else {
                            alert('Error saving pricing. Please try again.');
                        }
                    }
                });
            },

            // Initialize supplier settings from existing lines data
            initializeSupplierSettings() {
                const suppliers = {};

                // Collect all chosen suppliers from the lines
                this.rfqLines.forEach(line => {
                    if (line.chosen_supplier) {
                        const supplierId = line.chosen_supplier;
                        const supplierObj = this.allSuppliers.find(s => s.id === supplierId);

                        if (!suppliers[supplierId] && supplierObj) {
                            suppliers[supplierId] = {
                                id: supplierId,
                                name: supplierObj.name,
                                deliveryCost: 0,
                                lineDeliveryCost: 0,
                                mov: 0,
                                lineMinValue: 0,
                                autoAdjust: true,
                                lines: []
                            };
                        }

                        if (suppliers[supplierId]) {
                            suppliers[supplierId].lines.push(line.id);
                        }
                    }
                });

                this.supplierSettings = suppliers;
                this.updateDeliveryCostAllocations();
            },

            // Initialize tables
            initializeTables() {
                // Initialize the RFQ lines table first
                this.initializeRFQLinesTable();

                // Add an event listener for when the first table is fully built
                if (this.rfqLinesTable) {
                    this.rfqLinesTable.on("tableBuilt", () => {
                        this.initializeSupplierSummaryTable();
                    });
                } else {
                    // Fallback if the first table failed to initialize
                    this.initializeSupplierSummaryTable();
                }
            },

            // Main RFQ Lines table setup - SIMPLIFIED VERSION
            initializeRFQLinesTable() {
                const _this = this;

                // Create simplified columns configuration (removed editors)
                const columns = [
                    {
                        title: "Status",
                        field: "status_id",
                        formatter: function(cell) {
                            const statusId = cell.getValue();
                            const status = _this.statuses.find(s => s.id === statusId);
                            return status ? status.status : "";
                        },
                        headerFilter: "list",
                        headerFilterParams: {
                            values: {"": "All", ..._this.statuses.reduce((acc, status) => {
                                acc[status.id] = status.status;
                                return acc;
                            }, {})}
                        }
                    },
                    {title: "Line Number", field: "line_number", sorter: "number"},
                    {title: "Part Number", field: "part_number"},
                    {title: "Original Quantity", field: "quantity", sorter: "number"},
                    {title: "Adjusted Quantity", field: "adjusted_quantity"},
                    {title: "Manufacturer", field: "manufacturer"},
                    {
                        title: "Current Supplier",
                        field: "chosen_supplier",
                        formatter: function(cell) {
                            const supplierId = cell.getValue();
                            const supplier = _this.allSuppliers.find(s => s.id === supplierId);
                            return supplier ? supplier.name : "";
                        }
                    },
                    {
                        title: "Currency",
                        field: "cost_currency",
                        formatter: function(cell) {
                            const currencyId = cell.getValue();
                            const currency = _this.currencies.find(c => c.id === currencyId);
                            return currency ? currency.currency_code : "";
                        }
                    },
                    {
                        title: "Unit Cost",
                        field: "cost",
                        formatter: "money",
                        formatterParams: { precision: 2 }
                    },
                    {
                        title: "Delivery Cost",
                        field: "delivery_cost",
                        formatter: "money",
                        formatterParams: { precision: 2 }
                    },
                    {
                        title: "Total Cost",
                        field: "total_cost",
                        formatter: "money",
                        formatterParams: { precision: 2 }
                    },
                    {title: "Lead Time", field: "supplier_lead_time"},
                    {
                        title: "Margin (%)",
                        field: "margin"
                    },
                    {
                        title: "Sell Price",
                        field: "price",
                        formatter: "money",
                        formatterParams: { precision: 2 }
                    },
                    {
                        title: "Line Value",
                        field: "line_value",
                        formatter: "money",
                        formatterParams: { precision: 2 }
                    },
                    {title: "Notes", field: "note"},
                    {
                        title: "Actions",
                        formatter: function(cell) {
                            const rowData = cell.getRow().getData();
                            return `<button type="button" class="btn btn-sm btn-outline-primary offers-btn" data-line-id="${rowData.id}">
                                        <i class="bi bi-list"></i> View Offers
                                    </button>`;
                        },
                        cellClick: function(e, cell) {
                            if (e.target.classList.contains('offers-btn') || e.target.closest('.offers-btn')) {
                                const lineId = cell.getRow().getData().id;
                                _this.showOffersForLine(lineId);
                            }
                        },
                        hozAlign: "center",
                        width: 120
                    }
                ];

                // Prepare data by adding computed properties
                const tableData = this.rfqLines.map(line => {
                    return {
                        ...line,
                        adjusted_quantity: line.adjusted_quantity || line.quantity,
                        delivery_cost: line.delivery_cost || 0,
                        total_cost: line.total_cost || line.cost,
                        price: line.price || 0,
                        line_value: line.line_value || 0
                    };
                });

                try {
                    // Initialize Tabulator with error handling
                    this.rfqLinesTable = new Tabulator("#rfq-lines-table", {
                        data: tableData,
                        columns: columns,
                        layout: "fitDataTable",
                        pagination: false,
                        movableColumns: true,
                        height: "65vh",
                        rowFormatter: function(row) {
                            const rowData = row.getData();
                            const supplierId = rowData.chosen_supplier;

                            if (supplierId &&
                                _this.supplierSettings[supplierId] &&
                                _this.supplierSettings[supplierId].lineMinValue > 0) {

                                const lineValue = rowData.cost * rowData.adjusted_quantity;
                                if (lineValue < _this.supplierSettings[supplierId].lineMinValue) {
                                    row.getElement().classList.add("line-mov-issue");
                                } else {
                                    row.getElement().classList.remove("line-mov-issue");
                                }
                            }
                        }
                    });

                    // Listen for data updated
                    this.rfqLinesTable.on("dataChanged", function(data) {
                        _this.rfqLines = data;
                        if (_this.summaryTableInitialized) {
                            _this.updateSummaryTable();
                        }
                    });
                } catch (error) {
                    console.error("Error initializing RFQ Lines Table:", error);
                }
            },

            // Supplier summary table setup
            initializeSupplierSummaryTable() {
                const columns = [
                    {title: "Supplier", field: "name"},
                    {
                        title: "Items Total",
                        field: "itemsTotal",
                        formatter: "money",
                        formatterParams: { precision: 2 }
                    },
                    {
                        title: "Delivery Cost",
                        field: "deliveryCost",
                        formatter: "money",
                        formatterParams: { precision: 2 }
                    },
                    {
                        title: "MOV",
                        field: "mov",
                        formatter: "money",
                        formatterParams: { precision: 2 }
                    },
                    {
                        title: "MOV Status",
                        field: "movStatus",
                        formatter: function(cell) {
                            const value = cell.getValue();
                            let className = "badge ";

                            switch(value) {
                                case "Met":
                                case "All Met":
                                    className += "bg-success";
                                    break;
                                case "Not Met":
                                    className += "bg-danger";
                                    break;
                                case "Line Issues":
                                    className += "bg-warning";
                                    break;
                                default:
                                    className += "bg-secondary";
                            }

                            return `<span class="${className}">${value}</span>`;
                        }
                    },
                    {
                        title: "Total Value",
                        field: "totalValue",
                        formatter: "money",
                        formatterParams: { precision: 2 }
                    }
                ];

                try {
                    // Prepare summary data for initial load
                    const summaryData = this.prepareSummaryData();

                    // Initialize Tabulator with prepared data
                    this.supplierSummaryTable = new Tabulator("#supplier-summary-table", {
                        data: summaryData,
                        columns: columns,
                        layout: "fitColumns",
                        height: "auto"
                    });

                    // Mark as initialized after successful table creation
                    this.supplierSummaryTable.on("tableBuilt", () => {
                        this.summaryTableInitialized = true;
                    });
                } catch (error) {
                    console.error("Error initializing Supplier Summary Table:", error);
                }
            },

            // Prepare summary data
            prepareSummaryData() {
                const summaryData = [];

                for (const [supplierId, supplier] of Object.entries(this.supplierSettings)) {
                    // Skip suppliers with no lines
                    if (supplier.lines.length === 0) continue;

                    // Calculate totals for this supplier
                    let itemsTotal = 0;
                    let totalValue = 0;

                    for (const lineId of supplier.lines) {
                        const line = this.rfqLines.find(l => l.id === lineId);
                        if (line) {
                            const cost = parseFloat(line.cost) || 0;
                            const quantity = parseInt(line.adjusted_quantity) || 0;
                            itemsTotal += cost * quantity;
                            totalValue += parseFloat(line.line_value) || 0;
                        }
                    }

                    // Determine MOV status
                    let movStatus = 'N/A';

                    if (supplier.mov > 0) {
                        movStatus = itemsTotal >= supplier.mov ? 'Met' : 'Not Met';
                    }

                    if (supplier.lineMinValue > 0) {
                        const allLinesMeet = this.allLinesMeetMinValue(supplierId);
                        if (!allLinesMeet) {
                            movStatus = movStatus === 'Met' ? 'Line Issues' : 'Not Met';
                        } else if (movStatus === 'N/A') {
                            movStatus = 'All Met';
                        }
                    }

                    summaryData.push({
                        id: supplierId,
                        name: supplier.name,
                        itemsTotal: itemsTotal,
                        deliveryCost: supplier.deliveryCost,
                        mov: supplier.mov,
                        movStatus: movStatus,
                        totalValue: totalValue
                    });
                }

                return summaryData;
            },

            // Update supplier summary table
            updateSummaryTable() {
                // Make sure the table is initialized before updating
                if (!this.supplierSummaryTable || !this.summaryTableInitialized) {
                    return;
                }

                const summaryData = this.prepareSummaryData();

                // Safe update with error handling
                try {
                    this.supplierSummaryTable.setData(summaryData);
                } catch (error) {
                    console.error("Error updating summary table:", error);
                }
            },

            // Initialize offers table in modal
            initializeOffersTable() {
                const _this = this;
                const lineId = this.$store.currentLineId;
                if (!lineId) return;

                // Loading indicator
                document.getElementById('offers-table-container').innerHTML = `
                    <div class="text-center my-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-2">Loading offers...</p>
                    </div>
                `;

                // Create columns configuration
                const columns = [
                    {title: "Supplier", field: "supplier.name"},
                    {
                        title: "Price",
                        field: "price",
                        formatter: "money",
                        formatterParams: { precision: 2 }
                    },
                    {
                        title: "Currency",
                        field: "currency.code",
                    },
                    {title: "Lead Time (days)", field: "lead_time"},
                    {
                        title: "Actions",
                        formatter: function() {
                            return `<button type="button" class="btn btn-sm btn-primary select-offer-btn">
                                    Select
                                </button>`;
                        },
                        cellClick: function(e, cell) {
                            if (e.target.classList.contains('select-offer-btn') || e.target.closest('.select-offer-btn')) {
                                const offer = cell.getRow().getData();
                                _this.selectOffer(lineId, offer);
                            }
                        },
                        hozAlign: "center",
                        width: 100
                    }
                ];

                // Fetch real offers data from the API
                fetch(`/rfqs/api/rfq_lines/${lineId}/offers`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.success && data.offers) {
                            // Initialize offers table with real data
                            if (_this.offersTable) {
                                _this.offersTable.destroy();
                            }

                            try {
                                _this.offersTable = new Tabulator("#offers-table-container", {
                                    data: data.offers,
                                    columns: columns,
                                    layout: "fitColumns",
                                    height: "auto",
                                    placeholder: "No offers available for this line"
                                });
                            } catch (error) {
                                console.error("Error initializing offers table:", error);
                                document.getElementById('offers-table-container').innerHTML = `
                                    <div class="alert alert-danger">Error loading offers: ${error.message}</div>
                                `;
                            }
                        } else {
                            // Handle error or no offers
                            document.getElementById('offers-table-container').innerHTML = `
                                <div class="alert alert-info">${data.error || 'No offers available for this line'}</div>
                            `;
                        }
                    })
                    .catch(error => {
                        console.error("Error fetching offers:", error);
                        document.getElementById('offers-table-container').innerHTML = `
                            <div class="alert alert-danger">Error loading offers: ${error.message}</div>
                        `;
                    });
            },

            // Show offers modal for a line
            showOffersForLine(lineId) {
                // Store current line ID for reference
                this.$store.currentLineId = lineId;

                // Get the line details to show in the modal title
                const line = this.rfqLines.find(l => l.id === lineId);
                if (line) {
                    const modalTitle = document.getElementById('offersModalLabel');
                    modalTitle.textContent = `Offers for Line ${line.line_number}: ${line.part_number}`;
                }

                // Show the modal and load offers data
                const modal = new bootstrap.Modal(document.getElementById('offersModal'));
                modal.show();

                this.initializeOffersTable();
            },

            // Select an offer for a line
            selectOffer(lineId, offer) {
                // Get the row for this line
                const row = this.rfqLinesTable.getRow(lineId);
                if (!row) return;

                // Update the row data
                const rowData = row.getData();
                const oldSupplierId = rowData.chosen_supplier;
                rowData.chosen_supplier = offer.supplier.id;
                rowData.cost = offer.price;
                rowData.cost_currency = offer.currency.id;
                rowData.supplier_lead_time = offer.lead_time;

                // Update the table
                row.update(rowData);

                // Update supplier for the line
                this.updateSupplierForLine(lineId, offer.supplier.id);

                // Update cost
                this.updateCost(lineId, offer.price);

                // Show toast notification
                const supplierName = offer.supplier.name;
                const lineNumber = rowData.line_number;
                const partNumber = rowData.part_number;
                const toastHtml = `
                    <div class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
                        <div class="d-flex">
                            <div class="toast-body">
                                <strong>Offer Selected:</strong> ${supplierName} for Line ${lineNumber} (${partNumber})
                            </div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                        </div>
                    </div>
                `;

                // Create toast container if it doesn't exist
                let toastContainer = document.getElementById('toast-container');
                if (!toastContainer) {
                    toastContainer = document.createElement('div');
                    toastContainer.id = 'toast-container';
                    toastContainer.className = 'toast-container position-fixed bottom-0 end-0 p-3';
                    document.body.appendChild(toastContainer);
                }

                // Add toast to container
                toastContainer.innerHTML = toastHtml;

                // Initialize and show the toast
                const toastEl = toastContainer.querySelector('.toast');
                const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
                toast.show();

                // Hide the modal
                const modal = bootstrap.Modal.getInstance(document.getElementById('offersModal'));
                if (modal) {
                    modal.hide();
                }
            },

            // Update supplier for a line
            updateSupplierForLine(lineId, supplierId) {
                // Remove line from previous supplier
                for (const [id, supplier] of Object.entries(this.supplierSettings)) {
                    const index = supplier.lines.indexOf(lineId);
                    if (index > -1) {
                        supplier.lines.splice(index, 1);
                    }
                }

                // Add line to new supplier
                if (supplierId) {
                    if (!this.supplierSettings[supplierId]) {
                        const supplierObj = this.allSuppliers.find(s => s.id === supplierId);
                        if (supplierObj) {
                            this.supplierSettings[supplierId] = {
                                id: supplierId,
                                name: supplierObj.name,
                                deliveryCost: 0,
                                lineDeliveryCost: 0,
                                mov: 0,
                                lineMinValue: 0,
                                autoAdjust: true,
                                lines: []
                            };
                        }
                    }

                    if (this.supplierSettings[supplierId]) {
                        this.supplierSettings[supplierId].lines.push(lineId);
                    }
                }

                // Update calculations
                this.updateDeliveryCostAllocations();
                this.updateAllCalculations();
            },

            // Update delivery cost allocations
            updateDeliveryCostAllocations() {
                // Reset all delivery costs
                this.lineDeliveryCosts = {};

                // Allocate delivery costs for each supplier
                for (const [supplierId, supplier] of Object.entries(this.supplierSettings)) {
                    // Skip if no lines
                    if (supplier.lines.length === 0) continue;

                    // Calculate per-line delivery cost
                    supplier.lineDeliveryCost = supplier.lineDeliveryCost || 0;

                    // Apply per-line delivery cost
                    if (supplier.lineDeliveryCost > 0) {
                        for (const lineId of supplier.lines) {
                            const line = this.rfqLines.find(l => l.id === lineId);
                            if (line) {
                                const quantity = parseInt(line.adjusted_quantity) || 1;
                                const lineDeliveryCost = supplier.lineDeliveryCost / quantity; // Per unit
                                this.lineDeliveryCosts[lineId] = lineDeliveryCost;
                            }
                        }
                    }

                    // Apply proportional delivery cost from the total
                    if (supplier.deliveryCost > 0) {
                        // Calculate total line values for this supplier
                        let totalValue = 0;
                        for (const lineId of supplier.lines) {
                            const line = this.rfqLines.find(l => l.id === lineId);
                            if (line) {
                                const cost = parseFloat(line.cost) || 0;
                                const quantity = parseInt(line.adjusted_quantity) || 0;
                                totalValue += cost * quantity;
                            }
                        }

                        // Allocate delivery cost proportionally to line values
                        if (totalValue > 0) {
                            for (const lineId of supplier.lines) {
                                const line = this.rfqLines.find(l => l.id === lineId);
                                if (line) {
                                    const cost = parseFloat(line.cost) || 0;
                                    const quantity = parseInt(line.adjusted_quantity) || 0;
                                    const lineValue = cost * quantity;

                                    // Calculate proportional delivery cost
                                    const deliveryCost = (lineValue / totalValue) * supplier.deliveryCost;
                                    const deliveryCostPerUnit = deliveryCost / quantity || 0;

                                    // Update the display - add to existing value (from line delivery cost)
                                    this.lineDeliveryCosts[lineId] = (this.lineDeliveryCosts[lineId] || 0) + deliveryCostPerUnit;
                                }
                            }
                        } else {
                            // If total value is 0, distribute equally
                            const deliveryCostPerLine = supplier.deliveryCost / supplier.lines.length;

                            for (const lineId of supplier.lines) {
                                const line = this.rfqLines.find(l => l.id === lineId);
                                if (line) {
                                    const quantity = parseInt(line.adjusted_quantity) || 1;
                                    const deliveryCostPerUnit = deliveryCostPerLine / quantity;

                                    this.lineDeliveryCosts[lineId] = (this.lineDeliveryCosts[lineId] || 0) + deliveryCostPerUnit;
                                }
                            }
                        }
                    }
                }

                // Update all rows with delivery costs
                if (this.rfqLinesTable) {
                    try {
                        this.rfqLinesTable.getRows().forEach(row => {
                            const rowData = row.getData();
                            rowData.delivery_cost = this.lineDeliveryCosts[rowData.id] || 0;
                            row.update(rowData);
                        });
                    } catch (error) {
                        console.error("Error updating delivery costs:", error);
                    }
                }

                // Update all total costs
                this.updateAllLineTotals();
            },

            // Update a line's calculations
            updateLineTotals(lineId) {
                try {
                    const row = this.rfqLinesTable.getRow(lineId);
                    if (!row) return;

                    const rowData = row.getData();
                    const cost = parseFloat(rowData.cost) || 0;
                    const quantity = parseInt(rowData.adjusted_quantity) || 0;
                    const margin = parseFloat(rowData.margin) || 0;
                    const deliveryCostPerUnit = parseFloat(rowData.delivery_cost) || 0;

                    // Calculate total cost (including delivery)
                    const totalCostPerUnit = cost + deliveryCostPerUnit;
                    rowData.total_cost = totalCostPerUnit;

                    // Calculate sell price
                    const sellPrice = totalCostPerUnit * (1 + margin / 100);
                    rowData.price = sellPrice;

                    // Calculate line value
                    const lineValue = sellPrice * quantity;
                    rowData.line_value = lineValue;

                    // Update the row
                    row.update(rowData);

                    // Update supplier summary if initialized
                    if (this.summaryTableInitialized) {
                        this.updateSummaryTable();
                    }
                } catch (error) {
                    console.error("Error updating line totals for line " + lineId + ":", error);
                }
            },

            // Update all line totals
            updateAllLineTotals() {
                if (this.rfqLinesTable) {
                    try {
                        const rows = this.rfqLinesTable.getRows();
                        rows.forEach(row => {
                            const lineId = row.getData().id;
                            this.updateLineTotals(lineId);
                        });
                    } catch (error) {
                        console.error("Error updating all line totals:", error);
                    }
                }
            },

            // Update cost for a line
            updateCost(lineId, value) {
                try {
                    const row = this.rfqLinesTable.getRow(lineId);
                    if (!row) return;

                    const rowData = row.getData();
                    const newCost = parseFloat(value) || 0;
                    rowData.cost = newCost;

                    // Update the row
                    row.update(rowData);

                    // Check if this line has a supplier
                    if (rowData.chosen_supplier) {
                        const supplierId = rowData.chosen_supplier;

                        // Update delivery cost allocations as they might be cost-based
                        this.updateDeliveryCostAllocations();

                        // Check if this line meets minimum value requirements
                        if (this.supplierSettings[supplierId]) {
                            this.checkAndAdjustForLineMOV(supplierId);
                        }
                    }

                    // Update line totals
                    this.updateLineTotals(lineId);
                } catch (error) {
                    console.error("Error updating cost for line " + lineId + ":", error);
                }
            },

            // Update adjusted quantity
            updateAdjustedQuantity(lineId, value) {
                try {
                    const row = this.rfqLinesTable.getRow(lineId);
                    if (!row) return;

                    const rowData = row.getData();
                    const newQuantity = parseInt(value) || 0;
                    rowData.adjusted_quantity = newQuantity;

                    // Update the row
                    row.update(rowData);

                    // Check if this line has a supplier
                    if (rowData.chosen_supplier) {
                        const supplierId = rowData.chosen_supplier;

                        // Update delivery cost allocations as they might be quantity-based
                        this.updateDeliveryCostAllocations();

                        // Check if this line meets minimum value requirements
                        if (this.supplierSettings[supplierId]) {
                            this.checkAndAdjustForLineMOV(supplierId);
                        }
                    }

                    // Update line totals
                    this.updateLineTotals(lineId);
                } catch (error) {
                    console.error("Error updating adjusted quantity for line " + lineId + ":", error);
                }
            },

            // Check and adjust for MOV
            checkAndAdjustForMOV(supplierId) {
                try {
                    const supplier = this.supplierSettings[supplierId];
                    if (!supplier || supplier.mov <= 0 || supplier.lines.length === 0 || !supplier.autoAdjust) return;

                    // Calculate current total value for this supplier
                    let totalValue = 0;
                    for (const lineId of supplier.lines) {
                        const line = this.rfqLines.find(l => l.id === lineId);
                        if (line) {
                            const cost = parseFloat(line.cost) || 0;
                            const quantity = parseInt(line.adjusted_quantity) || 0;
                            totalValue += cost * quantity;
                        }
                    }

                    // If total value is below MOV, we need to adjust
                    if (totalValue < supplier.mov) {
                        const deficit = supplier.mov - totalValue;

                        // Find the line with the highest unit cost to adjust
                        let highestCostLine = null;
                        let highestCost = 0;

                        for (const lineId of supplier.lines) {
                            const line = this.rfqLines.find(l => l.id === lineId);
                            if (line) {
                                const cost = parseFloat(line.cost) || 0;
                                if (cost > highestCost) {
                                    highestCost = cost;
                                    highestCostLine = line;
                                }
                            }
                        }

                        // Adjust the quantity of the highest cost line
                        if (highestCostLine && highestCost > 0) {
                            const additionalUnits = Math.ceil(deficit / highestCost);
                            const currentQuantity = parseInt(highestCostLine.adjusted_quantity) || 0;
                            const newQuantity = currentQuantity + additionalUnits;

                            // Update the line
                            const row = this.rfqLinesTable.getRow(highestCostLine.id);
                            if (row) {
                                const rowData = row.getData();
                                rowData.adjusted_quantity = newQuantity;
                                row.update(rowData);

                                // Update calculations
                                this.updateAdjustedQuantity(highestCostLine.id, newQuantity);
                            }
                        }
                    }
                } catch (error) {
                    console.error("Error checking/adjusting for MOV for supplier " + supplierId + ":", error);
                }
            },

            // Check and adjust for line MOV
            checkAndAdjustForLineMOV(supplierId) {
                try {
                    const supplier = this.supplierSettings[supplierId];
                    if (!supplier || supplier.lineMinValue <= 0 || supplier.lines.length === 0 || !supplier.autoAdjust) return;

                    // Check each line against the line MOV
                    for (const lineId of supplier.lines) {
                        const line = this.rfqLines.find(l => l.id === lineId);

                        if (line) {
                            const cost = parseFloat(line.cost) || 0;
                            const quantity = parseInt(line.adjusted_quantity) || 0;
                            const lineValue = cost * quantity;

                            // If line value is below the MOV and cost is greater than zero
                            if (lineValue < supplier.lineMinValue && cost > 0) {
                                const requiredQuantity = Math.ceil(supplier.lineMinValue / cost);

                                // Update the line
                                const row = this.rfqLinesTable.getRow(lineId);
                                if (row) {
                                    const rowData = row.getData();
                                    rowData.adjusted_quantity = requiredQuantity;

                                    // Add visual indication class (handled by rowFormatter)
                                    row.update(rowData);

                                    // Update calculations
                                    this.updateAdjustedQuantity(lineId, requiredQuantity);
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.error("Error checking/adjusting for line MOV for supplier " + supplierId + ":", error);
                }
            },

            // Update all calculations
            updateAllCalculations() {
                try {
                    // Update delivery costs
                    this.updateDeliveryCostAllocations();

                    // Check MOV status
                    this.checkMOVStatus();

                    // Update summary table if initialized
                    if (this.summaryTableInitialized) {
                        this.updateSummaryTable();
                    }
                } catch (error) {
                    console.error("Error updating all calculations:", error);
                }
            },

            // Check MOV status for all suppliers
            checkMOVStatus() {
                for (const [supplierId, supplier] of Object.entries(this.supplierSettings)) {
                    this.checkSupplierMOVStatus(supplierId);
                }
            },

            // Check MOV status for a specific supplier
            checkSupplierMOVStatus(supplierId) {
                const supplier = this.supplierSettings[supplierId];
                if (!supplier) return;

                // Skip suppliers with no lines
                if (supplier.lines.length === 0) return;

                // Format line values for display
                supplier.totalItemsValue = this.calculateSupplierTotalValue(supplierId);
            },

            // Calculate total value for a supplier
            calculateSupplierTotalValue(supplierId) {
                const supplier = this.supplierSettings[supplierId];
                if (!supplier) return 0;

                let totalValue = 0;
                for (const lineId of supplier.lines) {
                    const line = this.rfqLines.find(l => l.id === lineId);
                    if (line) {
                        totalValue += parseFloat(line.line_value) || 0;
                    }
                }

                return totalValue;
            },

            // Get MOV status text
            getMovStatusText(supplierId) {
                const supplier = this.supplierSettings[supplierId];
                if (!supplier) return 'N/A';

                if (supplier.mov <= 0 && supplier.lineMinValue <= 0) return 'N/A';

                // Check total MOV
                const totalItemsValue = this.calculateSupplierItemsTotal(supplierId);
                const allLinesMeetMinValue = this.allLinesMeetMinValue(supplierId);

                if (supplier.mov > 0 && totalItemsValue < supplier.mov) {
                    return 'Not Met';
                }

                if (supplier.lineMinValue > 0 && !allLinesMeetMinValue) {
                    return 'Line Issues';
                }

                return 'All Met';
            },

            // Get MOV status class
            getMovStatusClass(supplierId) {
                const status = this.getMovStatusText(supplierId);

                switch (status) {
                    case 'All Met':
                        return 'bg-success';
                    case 'Line Issues':
                        return 'bg-warning';
                    case 'Not Met':
                        return 'bg-danger';
                    default:
                        return 'bg-secondary';
                }
            },

            // Calculate supplier items total (for MOV check)
            calculateSupplierItemsTotal(supplierId) {
                const supplier = this.supplierSettings[supplierId];
                if (!supplier) return 0;

                let itemsTotal = 0;
                for (const lineId of supplier.lines) {
                    const line = this.rfqLines.find(l => l.id === lineId);
                    if (line) {
                        const cost = parseFloat(line.cost) || 0;
                        const quantity = parseInt(line.adjusted_quantity) || 0;
                        itemsTotal += cost * quantity;
                    }
                }

                return itemsTotal;
            },

            // Check if all lines meet minimum value
            allLinesMeetMinValue(supplierId) {
                const supplier = this.supplierSettings[supplierId];
                if (!supplier || supplier.lineMinValue <= 0) return true;

                for (const lineId of supplier.lines) {
                    const line = this.rfqLines.find(l => l.id === lineId);
                    if (line) {
                        const cost = parseFloat(line.cost) || 0;
                        const quantity = parseInt(line.adjusted_quantity) || 0;
                        const lineValue = cost * quantity;

                        if (lineValue < supplier.lineMinValue) {
                            return false;
                        }
                    }
                }

                return true;
            },

            // Format currency for display
            formatCurrency(value) {
                return value.toFixed(2);
            },

            // Get pricing data for saving
            getPricingData() {
                return {
                    rfq_id: {{ rfq_id }},
                    lines: this.rfqLines.map(line => {
                        return {
                            id: line.id,
                            status_id: line.status_id,
                            quantity: line.adjusted_quantity,
                            chosen_supplier: line.chosen_supplier,
                            cost_currency: line.cost_currency,
                            cost: line.cost,
                            supplier_lead_time: line.supplier_lead_time,
                            margin: line.margin,
                            note: line.note,
                            total_cost: line.total_cost,
                            price: line.price,
                            line_value: line.line_value
                        };
                    })
                };
            }
        };
    });
});
</script>
