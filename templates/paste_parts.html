{% extends "base.html" %}

{% block content %}
<h1>Paste Part Numbers for RFQ: {{ rfq.customer_ref }}</h1>

<div id="part-numbers-table" style="width: 100%; height: 400px;"></div>
<button id="save-btn" class="btn btn-primary">Save</button>

<script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css">

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const container = document.getElementById('part-numbers-table');

        // Initialize Handsontable with 10 empty rows
        const hot = new Handsontable(container, {
            licenseKey: 'non-commercial-and-evaluation',
            data: Handsontable.helper.createSpreadsheetData(10, 3),  // 10 rows, 3 columns (Line Number, Part Number, Quantity)
            colHeaders: ['Line Number', 'Part Number', 'Quantity'],
            columns: [
                { data: 0, type: 'numeric' },  // First column: Line Number
                { data: 1, type: 'text' },     // Second column: Part Number
                { data: 2, type: 'numeric' }   // Third column: Quantity
            ],
            rowHeaders: true,
            contextMenu: true,  // Enable right-click options like copy-paste
            stretchH: 'all',
            height: 'auto',
            width: '100%',
            manualColumnResize: true,
            manualRowResize: true,
            minRows: 10,  // Start with 10 rows
            afterPaste: function(data, coords) {
                // Check if the paste operation exceeds the current table size
                const numRowsToAdd = data.length - (hot.countRows() - coords[0].row);

                // If more rows are needed, add them dynamically
                if (numRowsToAdd > 0) {
                    hot.alter('insert_row', hot.countRows(), numRowsToAdd);
                }
            }
        });

        document.getElementById('save-btn').addEventListener('click', function() {
            const data = hot.getData();  // Get the data from the table

            // Send the data to the server
            fetch('{{ url_for("rfqs.paste_rfq_parts", rfq_id=rfq.id) }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ part_numbers_data: data })
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    alert('Data saved successfully!');
                } else {
                    alert('Error saving data.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while saving.');
            });
        });
    });
</script>

{% endblock %}
