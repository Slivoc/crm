<!-- modals/create_tag_modal.html -->
<div class="modal fade show" id="createTagModal" tabindex="-1" aria-labelledby="createTagModalLabel" aria-hidden="true" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="createTagModalLabel">Create New Industry Tag</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="createTagForm">
                    <div class="mb-3">
                        <label for="tagname" class="form-label">Tag Name*</label>
                        <input type="text" class="form-control" id="tagname" required>
                    </div>
                    <div class="mb-3">
                        <label for="tagDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="tagDescription" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="parentTagId" class="form-label">Parent Tag ID (Optional)</label>
                        <input type="number" class="form-control" id="parentTagId" min="1">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="TagModal.create()">Create Tag</button>
            </div>
        </div>
    </div>
</div>
