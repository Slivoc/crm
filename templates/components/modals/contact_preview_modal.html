<!-- Contact Preview Modal -->
<div class="modal fade" id="contactPreviewModal" tabindex="-1" aria-labelledby="contactPreviewModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <div class="d-flex align-items-center w-100">
                    <div class="flex-grow-1">
                        <h5 class="modal-title" id="contactPreviewModalLabel">
                            <span id="contact-modal-name">Contact Details</span>
                        </h5>
                        <div class="text-muted small" id="contact-modal-customer"></div>
                    </div>
                    <div class="me-3">
                        <span class="badge" id="contact-modal-status" style="font-size: 0.875rem;"></span>
                    </div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- Contact Information Section -->
                <div class="contact-details-section mb-4">
    <h6 class="fw-bold mb-3">Contact Information</h6>
    <div class="row g-3">
        <!-- Timezone field -->
        <div class="col-md-6" id="contact-timezone-container" style="display: none;">
            <div class="d-flex align-items-center">
                <i class="bi bi-clock text-muted me-2"></i>
                <div>
                    <small class="text-muted d-block">Local Time</small>
                    <span id="contact-timezone-display" class="timezone-field">--:--:-- (Loading...)</span>
                </div>
            </div>
        </div>

        <div class="col-md-6" id="contact-email-container" style="display: none;">
                            <div class="d-flex align-items-center">
                                <i class="bi bi-envelope text-muted me-2"></i>
                                <div>
                                    <small class="text-muted d-block">Email</small>
                                    <a href="#" id="contact-modal-email"></a>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6" id="contact-phone-container" style="display: none;">
                            <div class="d-flex align-items-center">
                                <i class="bi bi-telephone text-muted me-2"></i>
                                <div>
                                    <small class="text-muted d-block">Phone</small>
                                    <a href="#" id="contact-modal-phone"></a>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6" id="contact-job-title-container" style="display: none;">
                            <div class="d-flex align-items-center">
                                <i class="bi bi-briefcase text-muted me-2"></i>
                                <div>
                                    <small class="text-muted d-block">Job Title</small>
                                    <span id="contact-modal-job-title"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Two Column Layout -->
                <div class="row">
                    <!-- Left Column - Log Communication Form -->
                    <div class="col-md-6">
                        <div id="log-communication-form">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="fw-bold mb-0">Log New Communication</h6>
                            </div>
                            <form id="communication-form">
                                <input type="hidden" id="comm-contact-id" name="contact_id">
                                <input type="hidden" id="comm-customer-id" name="customer_id">
                                <input type="hidden" id="comm-salesperson-id" name="salesperson_id">

                                <div class="mb-3">
                                    <label for="comm-type" class="form-label">Type</label>
                                    <select class="form-select" id="comm-type" name="update_type" required>
                                        <option value="">Select type...</option>
                                        <option value="phone">Phone Call</option>
                                        <option value="email">Email</option>
                                        <option value="meeting">Meeting</option>
                                        <option value="generic">Other</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="comm-notes" class="form-label">Notes</label>
                                    <!-- Preset Response Buttons -->
                                    <div class="mb-2">
                                        <small class="text-muted d-block mb-1">Quick responses:</small>
                                        <div class="btn-group btn-group-sm" role="group">
                                            <button type="button" class="btn btn-danger preset-response-btn" data-response="<i class='bi bi-x-circle-fill text-danger'></i> No answer">
                                                <i class="bi bi-x-circle-fill"></i> No answer
                                            </button>
                                            <button type="button" class="btn btn-info preset-response-btn" data-response="<i class='bi bi-file-earmark-text-fill text-info'></i> RFQ received">
                                                <i class="bi bi-file-earmark-text-fill"></i> RFQ received
                                            </button>
                                            <button type="button" class="btn btn-success preset-response-btn" data-response="<i class='bi bi-cart-check-fill text-success'></i> Order received">
                                                <i class="bi bi-cart-check-fill"></i> Order received
                                            </button>
                                        </div>
                                    </div>
                                    <textarea class="form-control" id="comm-notes" name="update_text" rows="4" autofocus></textarea>
                                </div>

                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="comm-date" class="form-label">Date</label>
                                            <input type="date" class="form-control" id="comm-date" name="update_date" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="comm-time" class="form-label">Time</label>
                                            <input type="time" class="form-control" id="comm-time" name="update_time">
                                            <div class="form-text">Optional - defaults to current time</div>
                                        </div>
                                    </div>
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-circle me-1"></i> Save Communication
                                    </button>
                                    <button type="button" class="btn btn-secondary" id="cancel-communication-btn">
                                        Clear
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Right Column - Communication History -->
                    <div class="col-md-6">
                        <div class="communication-history-section" id="communication-history-section">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="fw-bold mb-0">Communication History</h6>
                            </div>

                            <!-- Communication List -->
                            <div id="communication-history-list">
                                <div class="text-center text-muted py-4">
                                    <div class="spinner-border spinner-border-sm" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <p class="mt-2 mb-0">Loading communication history...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Update the modal footer in contactPreviewModal -->
<div class="modal-footer">
  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
  <button type="button" class="btn btn-outline-primary d-none" id="contact-modal-email-btn">
    <i class="bi bi-envelope me-1"></i> Write Email
  </button>
  <button type="button" class="btn btn-outline-primary" id="edit-from-preview-btn">
    <i class="bi bi-pencil me-1"></i> Edit Contact
  </button>
  <a href="#" id="view-full-contact-btn" class="btn btn-primary" target="_blank">
    <i class="bi bi-arrow-up-right-square me-1"></i> View Full Contact
  </a>
</div>
        </div>
    </div>
</div>
