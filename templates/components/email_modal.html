{# templates/components/email_modal.html #}
<div class="modal fade" id="emailModal" tabindex="-1" aria-labelledby="emailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="emailModalLabel">Send Email</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <!-- Left Column: Recipients -->
                    <div class="col-md-4">
                        <!-- Recipients Section -->
                        <div class="recipient-section mb-3" style="background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 0.375rem; padding: 1rem;">
                            <div class="d-flex align-items-center justify-content-between mb-2">
                                <label class="form-label fw-bold mb-0">Recipients</label>
                                <small class="text-muted recipient-count">0 recipients</small>
                            </div>

                            <div class="recipients-list">
                                <div class="no-recipients text-center text-muted fst-italic" style="padding: 1rem;">
                                    No recipients selected
                                </div>
                            </div>

                            <!-- Add recipient button -->
                            <button type="button" class="add-recipient-btn d-none btn btn-outline-primary btn-sm w-100 mt-2">
                                <i class="fas fa-plus me-2"></i>Add Another Recipient
                            </button>
                        </div>


</div>

                    <!-- Right Column: Email Content -->
                    <div class="col-md-8">
                        <!-- Email Type Selection -->
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="custom_email">
                                <label class="form-check-label" for="custom_email">
                                    Write Custom Email
                                </label>
                            </div>
                        </div>

                        <!-- Template Selection -->
                        <div class="mb-3 template-selection-section">
                            <label for="template_id" class="form-label">Select Template</label>
                            <div class="d-flex gap-2">
                                <select class="form-select select2-modal" id="template_id" name="template_id" required>
                                    <option value="">Choose a template...</option>
                                </select>
                            </div>
                        </div>

                        <!-- Custom Email Section -->
                        <div class="mb-3 custom-email-section d-none">
                            <div class="mb-3">
                                <label for="custom_subject" class="form-label">Subject</label>
                                <input type="text" class="form-control" id="custom_subject" placeholder="Email subject">
                            </div>
                            <div class="mb-3">
                                <label for="custom_body" class="form-label">Message</label>
                                <textarea class="form-control" id="custom_body" rows="10" placeholder="Type your email message here..."></textarea>

                                <!-- Enhanced placeholder help with clickable elements -->
                                <div class="placeholder-help mt-2">
                                    <div class="d-flex align-items-center mb-2">
                                        <i class="fas fa-magic me-2 text-primary"></i>
                                        <strong>Click to insert placeholders:</strong>
                                    </div>
                                    <div class="placeholder-tags">
                                        <!-- Placeholders will be created by JavaScript -->
                                    </div>
                                    <small class="text-muted mt-2 d-block">
                                        <i class="fas fa-info-circle me-1"></i>
                                        Click any placeholder above to insert it at your cursor position in the subject or message.
                                    </small>
                                </div>
                            </div>
                        </div>

                        <!-- Preview Section (initially hidden) -->
                        <div class="preview-section d-none">
                            <div class="mb-3">
                                <div class="row mb-2">
                                    <div class="col-2">
                                        <strong>To:</strong>
                                    </div>
                                    <div class="col recipient-info" style="font-family: monospace; font-size: 0.9em;"></div>
                                </div>
                                <div class="row mb-2">
                                    <div class="col-2">
                                        <strong>Subject:</strong>
                                    </div>
                                    <div class="col email-subject"></div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-2">
                                        <strong>Body:</strong>
                                    </div>
                                    <div class="col email-body border p-3 rounded bg-light"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Loading Spinner -->
                        <div class="text-center loading-spinner d-none">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
    <button type="button" class="btn btn-primary preview-btn">Preview</button>
    <button type="button" class="btn btn-info outlook-btn d-none" title="Opens Outlook with recipient/subject and copies styled content to clipboard">
        <i class="fas fa-copy me-2"></i><i class="fas fa-external-link-alt me-2"></i>Copy Content & Open Outlook
    </button>
</div>
        </div>
    </div>
</div>

<style>
.recipient-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem;
    margin-bottom: 0.5rem;
    background-color: white;
    border: 1px solid #e9ecef;
    border-radius: 0.25rem;
    transition: border-color 0.15s ease-in-out;
}

.recipient-item:hover {
    border-color: #0d6efd;
}

.recipient-item:last-child {
    margin-bottom: 0;
}

.recipient-info-item {
    display: flex;
    flex-direction: column;
    flex-grow: 1;
    min-width: 0; /* Allow text truncation */
}

.recipient-name {
    font-weight: 500;
    margin-bottom: 0.125rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.recipient-email {
    font-size: 0.875rem;
    color: #6c757d;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.recipient-badge {
    background-color: #e3f2fd;
    color: #1976d2;
    font-size: 0.75rem;
    padding: 0.25rem 0.5rem;
    border-radius: 0.25rem;
    margin-right: 0.5rem;
    white-space: nowrap;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
}

.add-recipient-btn:hover {
    border-color: #0d6efd !important;
    color: #0d6efd !important;
    background-color: #f8f9ff !important;
}

.outlook-btn {
    position: relative;
}

.outlook-btn:hover::after {
    content: "Opens Outlook with recipient & subject, copies styled content to clipboard for pasting";
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
    z-index: 1000;
    margin-bottom: 5px;
}

.outlook-btn:hover::before {
    content: "";
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #333;
    margin-bottom: -5px;
}



/* FIXED: Placeholder help section */
.placeholder-help {
    font-size: 0.875rem;
    margin-top: 0.5rem;
    padding: 0.75rem;
    background-color: #e3f2fd;
    border-left: 4px solid #1976d2;
    border-radius: 0 0.25rem 0.25rem 0;
}

.placeholder-tags {
    line-height: 2;
    margin-bottom: 0.5rem;
}

/* Enhanced styles for clickable placeholders */
.clickable-placeholder {
    cursor: pointer !important;
    padding: 3px 6px !important;
    border-radius: 4px !important;
    background-color: #f8f9fa !important;
    border: 1px solid #dee2e6 !important;
    transition: all 0.2s ease !important;
    display: inline-block !important;
    margin: 2px !important;
    font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace !important;
    font-size: 0.875rem !important;
    user-select: none !important;
}

.clickable-placeholder:hover {
    background-color: #007bff !important;
    color: white !important;
    border-color: #007bff !important;
    transform: translateY(-1px) !important;
    box-shadow: 0 2px 4px rgba(0,123,255,0.3) !important;
}

.clickable-placeholder:active {
    transform: translateY(0) !important;
    box-shadow: 0 1px 2px rgba(0,123,255,0.3) !important;
    background-color: #28a745 !important;
    border-color: #28a745 !important;
}

/* Animation for placeholder insertion feedback */
@keyframes placeholderInserted {
    0% {
        background-color: #28a745;
        color: white;
        transform: scale(1.1);
    }
    100% {
        background-color: #f8f9fa;
        color: inherit;
        transform: scale(1);
    }
}

.placeholder-inserted {
    animation: placeholderInserted 0.3s ease;
}

/* Responsive adjustments */
@media (max-width: 768px) {
    .row > .col-md-4,
    .row > .col-md-8 {
        flex: 0 0 100%;
        max-width: 100%;
    }

    .recipient-item {
        flex-direction: column;
        align-items: flex-start;
    }

    .recipient-info-item {
        width: 100%;
        margin-bottom: 0.5rem;
    }

    .recipient-badge {
        max-width: none;
        margin-right: 0;
        margin-bottom: 0.25rem;
    }

    .placeholder-tags {
        text-align: center;
    }

    .clickable-placeholder {
        margin: 2px 1px !important;
        font-size: 0.8rem !important;
    }
}

/* Multiple recipients in preview */
.recipient-info {
    max-height: 100px;
    overflow-y: auto;
    font-size: 0.9em;
    line-height: 1.3;
}

/* Better spacing for multiple recipients */
.recipients-list {
    max-height: 300px;
    overflow-y: auto;
}

/* Loading state for buttons */
.btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* Success/error states */
.recipient-item.success {
    border-color: #28a745;
    background-color: #f8fff9;
}

.recipient-item.error {
    border-color: #dc3545;
    background-color: #fff8f8;
}

/* Layout improvements for wider modal */
.modal-xl .modal-dialog {
    max-width: 1200px;
}

/* Adjust recipient section for sidebar layout */
.recipient-section {
    position: sticky;
    top: 0;
    max-height: 70vh;
    overflow-y: auto;
}

/* Better email method layout in sidebar */
.email-method-sidebar .form-check-label {
    font-size: 0.9rem;
}

.email-method-sidebar .form-check-label strong {
    font-size: 1rem;
}

</style>
