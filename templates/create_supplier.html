{% extends "base.html" %}
{% block content %}
<div class="container">
    <h1>Create Supplier</h1>
    <form action="{{ url_for('suppliers.create_supplier') }}" method="post">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" class="form-control">
        </div>
        <div class="form-group">
            <label for="contact_name">Contact Name</label>
            <input type="text" id="contact_name" name="contact_name" class="form-control">
        </div>
        <div class="form-group">
            <label for="contact_email">Contact Email</label>
            <input type="email" id="contact_email" name="contact_email" class="form-control">
        </div>
        <div class="form-group">
            <label for="contact_phone">Contact Phone</label>
            <input type="text" id="contact_phone" name="contact_phone" class="form-control">
        </div>
        <div class="form-group">
            <label for="buffer">Buffer</label>
            <input type="number" id="buffer" name="buffer" class="form-control">
        </div>
        <div class="form-group">
            <label for="currency">Currency</label>
            <input type="text" id="currency" name="currency" class="form-control">
        </div>
        <div class="form-group">
            <label for="fornitore">Fornitore</label>
            <input type="text" id="fornitore" name="fornitore" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Create Supplier</button>
    </form>
</div>
{% endblock %}
