{% extends "base.html" %}
{% block title %}Supplier Quote Lines{% endblock %}

{% block extra_css %}
<style>
.filters-card .form-label {
    font-weight: 600;
}

.lines-table {
    max-height: 72vh;
    overflow: auto;
}

.lines-table table {
    margin-bottom: 0;
}

.lines-table th {
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 2;
}

.lines-table td {
    vertical-align: top;
}

.line-part {
    min-width: 180px;
}

.line-money {
    white-space: nowrap;
}

.line-context {
    min-width: 175px;
}

.line-notes {
    min-width: 220px;
    max-width: 320px;
}

.supplier-filter-wrap .select2-container {
    width: 100% !important;
}
</style>
{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="card mb-3" style="border:1px solid #dee2e6;box-shadow:0 2px 4px rgba(0,0,0,.05);">
        <div class="card-header" style="background:#fff;border-bottom:2px solid #e9ecef;">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h5 class="card-title mb-0" style="font-weight:600;color:#212529;">
                    <i class="bi bi-clipboard-data me-2" style="color:#0d6efd;"></i>
                    Supplier Quote Lines
                </h5>
            </div>
        </div>
    </div>

    <div id="supplier-quote-lines-alerts"></div>

    <div class="card filters-card mb-3">
        <div class="card-header">
            <h6 class="mb-0">Filters</h6>
        </div>
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-2">
                    <label class="form-label">Parts List ID</label>
                    <input type="number" class="form-control" id="filter-list-id" placeholder="All">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Quote ID</label>
                    <input type="number" class="form-control" id="filter-quote-id" placeholder="All">
                </div>
                <div class="col-md-3 supplier-filter-wrap">
                    <label class="form-label">Supplier</label>
                    <select class="form-select" id="filter-supplier-id"></select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Part Number</label>
                    <input type="text" class="form-control" id="filter-part-number" placeholder="Search">
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" id="apply-filters-btn">
                        <i class="bi bi-funnel me-1"></i>Apply
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h6 class="mb-0">Actions</h6>
            <div class="d-flex flex-wrap gap-2 align-items-center">
                <select class="form-select" id="reassign-quote-select" style="min-width: 260px;"></select>
                <button class="btn btn-outline-primary" id="reassign-lines-btn" disabled>
                    <i class="bi bi-arrow-left-right me-1"></i>Move to Quote
                </button>
                <button class="btn btn-outline-danger" id="delete-lines-btn" disabled>
                    <i class="bi bi-trash me-1"></i>Delete Lines
                </button>
            </div>
        </div>
        <div class="card-body">
            <div class="lines-table border rounded">
                <table class="table table-sm table-striped align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="width:40px;">
                                <input type="checkbox" id="select-all-lines">
                            </th>
                            <th style="width:70px;">Edit</th>
                            <th style="width:90px;">Date</th>
                            <th>Supplier</th>
                            <th>Part</th>
                            <th style="width:80px;">Qty</th>
                            <th style="width:120px;">Price</th>
                            <th>Customer Quotes</th>
                            <th>Sales Orders</th>
                            <th>Quote/List</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody id="quote-lines-body"></tbody>
                </table>
            </div>
            <div class="text-muted mt-2" id="quote-lines-count"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="editQuoteLineModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Supplier Quote Line</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-line-id">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Quoted Part Number</label>
                        <input type="text" class="form-control" id="edit-quoted-part-number">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Manufacturer</label>
                        <input type="text" class="form-control" id="edit-manufacturer">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Qty Quoted</label>
                        <input type="number" step="1" class="form-control" id="edit-quantity-quoted">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Qty Available</label>
                        <input type="number" step="1" class="form-control" id="edit-qty-available">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Increment</label>
                        <input type="number" step="1" class="form-control" id="edit-purchase-increment">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">MOQ</label>
                        <input type="number" step="1" class="form-control" id="edit-moq">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Unit Price</label>
                        <input type="number" step="0.0001" class="form-control" id="edit-unit-price">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">LB Price</label>
                        <input type="number" step="0.0001" class="form-control" id="edit-lb-unit-price">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">PPP</label>
                        <input type="number" step="0.0001" class="form-control" id="edit-pieces-per-pound-used">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Lead Days</label>
                        <input type="number" step="1" class="form-control" id="edit-lead-time-days">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Condition</label>
                        <input type="text" class="form-control" id="edit-condition-code">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Certs</label>
                        <input type="text" class="form-control" id="edit-certifications">
                    </div>
                    <div class="col-md-6 d-flex align-items-end">
                        <div class="form-check me-4">
                            <input class="form-check-input" type="checkbox" id="edit-price-entered-as-lb">
                            <label class="form-check-label" for="edit-price-entered-as-lb">Price entered as lb</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="edit-is-no-bid">
                            <label class="form-check-label" for="edit-is-no-bid">No bid</label>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Notes</label>
                        <textarea class="form-control" id="edit-line-notes" rows="3"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="save-line-btn">
                    <i class="bi bi-save me-1"></i>Save Line
                </button>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/supplier_quote_lines_manage.js') }}?v={{ cache_bust }}"></script>
{% endblock %}
