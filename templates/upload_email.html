<!-- upload_email.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Email</title>
</head>
<body>
    <h1>Upload a .msg Email File</h1>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".msg">
        <button type="submit">Upload Email</button>
    </form>
</body>
</html>
